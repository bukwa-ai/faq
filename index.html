    border-radius: 999px;
    background: var(--bg);
    color: var(--ink);

    font-size: 15px;
    cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%231a1a1a' stroke-width='1.5' d='M1 1l5 5 5-5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 16px center;
  }
  .faq { display: flex; flex-direction: column; gap: 18px; }
  .item {
    background: var(--card);
    border: 1.5px solid var(--ink);
    border-radius: 14px;
    padding: 22px 26px;
  }
  .q {
    font-size: 19px; font-weight: 700; margin: 0 0 10px;
    display: flex; gap: 10px; align-items: baseline;
  }
  .q::before { content: "❦"; color: var(--ink); }
  .a { margin: 0; color: var(--ink-soft); line-height: 1.55; font-size: 16px; }
  .contact {
    margin-top: 48px; text-align: center; padding: 28px;
    border: 1.5px dashed var(--ink); border-radius: 14px; background: var(--card);
  }
  .contact h2 { margin: 0 0 8px; font-size: 22px; }
  .contact a { color: var(--ink); font-weight: 700; }
  footer {
    margin-top: 64px; text-align: center;
    color: var(--muted); font-size: 14px; font-style: italic;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111111;
      --ink: #f0ece3;

const LANG_CODES = ["en","ua","cs","fr","de","it","pl","ru","es","ja","zh"];

function getLangFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const code = (params.get("lang") || "").toLowerCase();
  return LANGS[code] ? code : "en";
}

function setUrlLang(code) {
  const url = new URL(window.location.href);
  url.searchParams.set("lang", code);
  window.history.replaceState({}, "", url);
}

function render(code) {
  const data = LANGS[code];
  document.documentElement.lang = code;
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (data[key]) el.textContent = data[key];
  });
  const faq = document.getElementById("faq");
  faq.innerHTML = "";
  FAQ_KEYS.forEach(k => {
    const [q, a] = data.faq[k];
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = `<p class="q"></p><p class="a"></p>`;
    item.querySelector(".q").textContent = q;
    item.querySelector(".a").textContent = a;
    faq.appendChild(item);
  });
}

const select = document.getElementById("langSelect");
LANG_CODES.forEach(c => {
  const opt = document.createElement("option");
  opt.value = c;
  opt.textContent = LANGS[c].name;
  select.appendChild(opt);
});

const initial = getLangFromUrl();
select.value = initial;
render(initial);

select.addEventListener("change", e => {
  const code = e.target.value;
  setUrlLang(code);
  render(code);
});
</script>
